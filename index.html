<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <script type="module" src="js/index.js"></script>
    <title>OBD</title>
</head>
<body class="bg-dark text-light">
    <header>
        <div class="px-3 pt-2 pb-0">
            <div class="row pb-0">
                <div class="col-4"><p class="fw-bold mb-1" id="p-data">Lunedì, 01 gennaio 1970</p></div>
                <div class="col-4 text-center"><p class="fw-bold mb-1" id="p-ora">00:00</p></div>
                <div class="col-4 d-flex justify-content-end"><p class="fw-bold mb-1" id="p-temp-esterna">2°C</p></div>
            </div>
        </div>
    </header>
    <main>
        <div class="p-5 row">
           <div class="col-5">

           </div>
           <div class="col-2">
               <div id="turnSignal" class="row mb-5">
                   <div class="col-4 d-flex align-items-center">
                       <img class="w-100"  src="icons/turn/turnSignalSxOff.svg">
                   </div>
                   <div class="col-4 d-flex align-items-center">
                       <img class="w-100"  src="icons/turn/hazardOff.svg">
                   </div>
                   <div class="col-4 d-flex align-items-center">
                       <img class="w-100"  src="icons/turn/turnSignalDxOff.svg">
                   </div>
               </div>
               <div id="lights">
                   <div class="d-flex align-items-center justify-content-center">
                       <img class="w-50"  src="icons/lights/noLight.svg"> <!-- CAMBIO IMMAGINE -->
                   </div>
                   <!--<div class="d-flex align-items-center">
                       <img class="w-100"  src="icons/lights/highLight.svg">
                   </div>
                   <div class="d-flex align-items-center">
                       <img class="w-100"  src="icons/lights/fogLight.svg">
                   </div>-->
               </div>
               <div id="fuel" class="">   <!-- MOSTRO SOLO SE IN RISERVA -->
                   <div class="d-flex align-items-center justify-content-center">
                       <img class="w-50" src="icons/fuel.svg">
                   </div>
               </div>
           </div>
           <div class="col-5">

           </div>
        </div>
    </main>
    <footer>
        <div class="p-5
        row">
            <div class="col-1 d-flex align-items-center">
                <img class="w-100" src="icons/battery.svg">
            </div>
            <div class="col-1 d-flex align-items-center">
                <img class="w-100"  src="icons/brakeSystem.svg">
            </div>
            <div class="col-1 d-flex align-items-center">
                <img class="w-100"  src="icons/doors.svg">
            </div>
            <div class="col-1 d-flex align-items-center">
                <img class="w-100"  src="icons/engineColant.svg">
            </div>
            <div class="col-1 d-flex align-items-center">

            </div>
            <div class="col-1 d-flex align-items-center">

            </div>
            <div class="col-1 d-flex align-items-center">
                <img class="w-100"  src="icons/injectors.svg">
            </div>
            <div class="col-1 d-flex align-items-center">

            <div class="col-1 d-flex align-items-center">

            </div>
            <div class="col-1 d-flex align-items-center">
                <img class="w-100"  src="icons/warning.svg">
            </div>
            <div class="col-1 d-flex align-items-center">
                <img class="w-100"  src="icons/temperature.svg">
            </div>
            <div class="col-1 d-flex align-items-center">
                <img class="w-100"  src="icons/candelette.svg">
            </div>
            <div class="col-1 d-flex align-items-center">
                <img class="w-100"  src="icons/motor.png">
            </div>
