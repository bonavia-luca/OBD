<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="js/index.js"></script>
    <script type="module" src="js/speed.js"></script>
    <title>OBD</title>
</head>
<body class="bg-dark text-light d-flex flex-column vh-100">
    <header>
        <div class="px-3 pt-2 pb-0">
            <div class="row pb-0">
                <div class="col-4"><p class="fw-bold mb-1" id="p-data">Lunedì, 01 gennaio 1970</p></div>
                <div class="col-4 text-center"><p class="fw-bold mb-1" id="p-ora">00:00</p></div>
                <div class="col-4 d-flex justify-content-end"><p class="fw-bold mb-1" id="p-temp-esterna">2°C</p></div>
            </div>
        </div>
    </header>
    <main class="d-flex flex-column flex-grow-1">
        <div class="p-5 row d-flex flex-grow-1">
            <div class="col-1 d-flex flex-grow-1">   <!-- MOSTRO SOLO SE IN RISERVA -->
                <div class="d-flex flex-column flex-grow-1 align-items-center justify-content-center">
                    <div class="progress flex-column justify-content-end w-75 flex-grow-1 mb-3">
                        <!-- <div class="progress-bar bg-success w-100" role="progressbar" style="height: 25%;" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>-->
                        <div class="progress-bar text-success bg-success w-100 fs-3 fw-bold" role="progressbar" style="height: 25%;" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">45°C</div>
                    </div>
                    <img id="fuel" class="w-75 mb-1" src="icons/fuel.svg">
                </div>
            </div>
            <div class="col-4">
                <div class="d-flex align-items-center justify-content-center">

                    <svg viewBox="0 0 200 200" class="w-100">
                        <defs>
                            <linearGradient id="speedGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#0dcaf0" />
                                <stop offset="100%" stop-color="#6610f2" />
                            </linearGradient>
                            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="3" result="blur" />
                                <feComposite in="SourceGraphic" in2="blur" operator="over" />
                            </filter>
                        </defs>

                        <circle cx="100" cy="100" r="75" fill="none" stroke="#2b3035" stroke-width="12"
                                stroke-dasharray="353 118" stroke-linecap="round" transform="rotate(135 100 100)" />

                        <circle id="speed-ring" cx="100" cy="100" r="75" fill="none" stroke="url(#speedGrad)" stroke-width="12"
                                stroke-dasharray="125 471" stroke-linecap="round" transform="rotate(135 100 100)" filter="url(#glow)"
                                style="transition: stroke-dasharray 0.5s ease-out;" />

                        <text id="speed-val" x="100" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="900" fill="#ffffff" text-anchor="middle" dominant-baseline="central">125</text>
                        <text x="100" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#adb5bd" text-anchor="middle" dominant-baseline="central" letter-spacing="2">KM/H</text>
                    </svg>

                </div>
           </div>
            <div class="col-2">
               <div id="turnSignal" class="row mb-5">
                   <div class="col-4 d-flex align-items-center">
                       <img class="w-100"  src="icons/turn/turnSignalSxOff.svg">
                   </div>
                   <div class="col-4 d-flex align-items-center">
                       <img class="w-100"  src="icons/turn/hazardOff.svg">
                   </div>
                   <div class="col-4 d-flex align-items-center">
                       <img class="w-100"  src="icons/turn/turnSignalDxOff.svg">
                   </div>
               </div>
               <div id="lights">
                   <div class="d-flex align-items-center justify-content-center">
                       <img class="w-50 neon-rosso"  src="icons/lights/noLight.svg"> <!-- CAMBIO IMMAGINE -->
                   </div>
                   <!--<div class="d-flex align-items-center justify-content-center">
                       <img class="w-50 neon-azzurro"  src="icons/lights/highLight.svg">
                   </div>
                   <div class="d-flex align-items-center justify-content-center">
                       <img class="w-50 neon-verde"  src="icons/lights/fogLight.svg">
                   </div>-->
               </div>

           </div>
            <div class="col-4">
                <div class="d-flex align-items-center justify-content-center">

                    <svg viewBox="0 0 200 200" class="w-100">
                        <defs>
                            <linearGradient id="rpmGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#fd7e14" />
                                <stop offset="100%" stop-color="#dc3545" />
                            </linearGradient>
                            <filter id="glowRpm" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="3" result="blur" />
                                <feComposite in="SourceGraphic" in2="blur" operator="over" />
                            </filter>
                        </defs>

                        <circle cx="100" cy="100" r="75" fill="none" stroke="#2b3035" stroke-width="12"
                                stroke-dasharray="353 118" stroke-linecap="round" transform="rotate(135 100 100)" />

                        <circle id="rpm-ring" cx="100" cy="100" r="75" fill="none" stroke="url(#rpmGrad)" stroke-width="12"
                                stroke-dasharray="0 471" stroke-linecap="round" transform="rotate(135 100 100)" filter="url(#glowRpm)"
                                style="transition: stroke-dasharray 0.5s ease-out;" />

                        <text id="rpm-val" x="100" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="900" fill="#ffffff" text-anchor="middle" dominant-baseline="central">0</text>
                        <text x="100" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#adb5bd" text-anchor="middle" dominant-baseline="central" letter-spacing="2">RPM</text>
                    </svg>

                </div>
            </div>
            <div class="col-1 d-flex flex-grow-1">
                <div class="d-flex flex-column flex-grow-1 align-items-center justify-content-center">
                   <div class="progress flex-column justify-content-end w-75 flex-grow-1 mb-3">
                       <div class="progress-bar bg-success w-100 fs-3 fw-bold" role="progressbar" style="height: 25%;" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">45°C</div>
                   </div>
                    <img class="w-75 mb-2"  src="icons/temperature.svg">
               </div>
           </div>
        </div>
    </main>
    <footer>
        <div class="p-5 row">
            <div class="col-6 row">
                <div class="col-1 d-flex align-items-center">
                    <img class="w-100 neon-rosso" src="icons/battery.svg">
                </div>
                <div class="col-1 d-flex align-items-center">
                    <img class="w-100 neon-rosso"  src="icons/brakeSystem.svg">
                </div>
                <div class="col-1 d-flex align-items-center">
                    <img class="w-100"  src="icons/engineColant.svg">
                </div>
                <div class="col-1 d-flex align-items-center">
                    <img class="w-100"  src="icons/engineOil.svg">
                </div>
                <div class="col-1 d-flex align-items-center">
                    <img class="w-100"  src="icons/injectors.svg">
                </div>
                <div class="col-1 d-flex align-items-center">
                    <img class="w-100"  src="icons/candelette.svg">
                </div>
                <div class="col-1 d-flex align-items-center">
                    <img class="w-100"  src="icons/motor.png">
                </div>
            </div>
            <div class="col-1 d-flex align-items-center">
                <img class="w-100"  src="icons/doors.svg">
            </div>
            <div class="col-1 d-flex align-items-center">
                <img class="w-100"  src="icons/hood.svg">
            </div>
            <div class="col-1 d-flex align-items-center">
                <img class="w-100"  src="icons/rearDefrost.svg">
            </div>
            <div class="col-1 d-flex align-items-center">
                <img class="w-100"  src="icons/trunk.svg">
            </div>
            <div class="col-1 d-flex align-items-center">
                <img class="w-100"  src="icons/warning.svg">
            </div>
        </div>
    </footer>

</body>
</html>
